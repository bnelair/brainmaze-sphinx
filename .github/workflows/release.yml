name: Release (reusable)

# Reusable release workflow shared across the BrainMaze package family.
#
# pyproject.toml is the single source of truth for the version (static [project].version).
# This workflow NEVER writes to a protected branch. It is triggered by the caller on push
# to main and only acts when the version on main has no matching tag yet -- i.e. right
# after a "Release vX.Y.Z" bump PR (see prepare-release.yml) is merged. It then:
#   1. runs the test suite,
#   2. tags vX.Y.Z (tags are not covered by the branch ruleset),
#   3. builds the sdist + wheel,
#   4. publishes to PyPI (Trusted Publishing by default),
#   5. creates a GitHub Release.
#
# Ordinary feature merges (dev -> main) don't change the version, so the tag already
# exists and this workflow no-ops -- only a version-changing merge releases.
#
# Callers reference it as:
#   uses: bnelair/brainmaze-sphinx/.github/workflows/release.yml@main

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.10"
      pypi-auth:
        description: "PyPI auth mode: trusted (OIDC) or token."
        type: string
        default: "trusted"
    secrets:
      PYPI_Token_General:
        description: "PyPI API token; only needed when pypi-auth is 'token'."
        required: false

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # Only release when the current pyproject version has no tag yet.
  guard:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decide whether to release
        id: check
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep -m1 -E '^version[[:space:]]*=' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null 2>&1; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${version} already exists -- nothing to release."
          else
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Version v${version} has no tag -- will release."
          fi

  test:
    needs: guard
    if: needs.guard.outputs.release == 'true'
    uses: bnelair/brainmaze-sphinx/.github/workflows/test.yml@main
    with:
      python-version: ${{ inputs.python-version }}

  release:
    needs: [guard, test]
    if: needs.guard.outputs.release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write      # push the tag + create the GitHub Release
      id-token: write      # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Tag the release
        run: |
          set -euo pipefail
          v="v${{ needs.guard.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$v"
          git push origin "$v"          # tag ref -- not covered by the branch ruleset

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing)
        if: ${{ inputs.pypi-auth == 'trusted' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to PyPI (API token)
        if: ${{ inputs.pypi-auth == 'token' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_Token_General }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.guard.outputs.version }}"
          name: "v${{ needs.guard.outputs.version }}"
          generate_release_notes: true
