name: Release (reusable)

# Reusable release workflow shared across the BrainMaze package family.
#
# pyproject.toml is the single source of truth for the version. This workflow:
#   1. runs the test suite,
#   2. bumps [project].version in pyproject.toml (patch/minor/major),
#   3. commits the bump to main and tags vX.Y.Z,
#   4. builds the sdist + wheel,
#   5. publishes to PyPI (Trusted Publishing by default, API token optional),
#   6. creates a GitHub Release.
#
# Callers reference it as:
#   uses: bnelair/brainmaze-sphinx/.github/workflows/release.yml@main

on:
  workflow_call:
    inputs:
      bump:
        description: "Semver part to bump: patch | minor | major."
        type: string
        required: true
      python-version:
        type: string
        default: "3.12"
      pypi-auth:
        description: "PyPI auth mode: trusted (OIDC) or token."
        type: string
        default: "trusted"
    secrets:
      PYPI_Token_General:
        description: "PyPI API token; only needed when pypi-auth is 'token'."
        required: false

jobs:
  # Reuse the shared test workflow so we never release a red build.
  test:
    uses: bnelair/brainmaze-sphinx/.github/workflows/test.yml@main
    with:
      python-version: ${{ inputs.python-version }}

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write      # push the version-bump commit + tag
      id-token: write      # PyPI Trusted Publishing (OIDC)
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Bump version in pyproject.toml
        id: ver
        shell: python
        run: |
          import os, re, pathlib
          bump = "${{ inputs.bump }}"
          if bump not in {"patch", "minor", "major"}:
              raise SystemExit(f"Invalid bump '{bump}' (expected patch|minor|major)")
          path = pathlib.Path("pyproject.toml")
          text = path.read_text()
          m = re.search(r'(?m)^version\s*=\s*"(\d+)\.(\d+)\.(\d+)"', text)
          if not m:
              raise SystemExit("No static [project].version = \"X.Y.Z\" found in pyproject.toml")
          major, minor, patch = (int(x) for x in m.groups())
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          new = f"{major}.{minor}.{patch}"
          path.write_text(text[:m.start()] + f'version = "{new}"' + text[m.end():])
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"version={new}\n")
          print(f"Bumped version -> {new}")

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml
          git commit -m "Release v${{ steps.ver.outputs.version }}"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Build distributions
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing)
        if: ${{ inputs.pypi-auth == 'trusted' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to PyPI (API token)
        if: ${{ inputs.pypi-auth == 'token' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_Token_General }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.ver.outputs.version }}"
          name: "v${{ steps.ver.outputs.version }}"
          generate_release_notes: true
