name: Release (reusable)

# Reusable release workflow shared across the BrainMaze package family.
#
# pyproject.toml is the single source of truth for the version (static [project].version).
# This workflow NEVER writes to a protected branch, and it does NOT publish to PyPI itself:
# PyPI Trusted Publishing does not support publishing from a reusable workflow, so the
# publish step must run in the caller's own top-level workflow. Here we only:
#   1. decide whether to release (the version on main has no tag yet),
#   2. run the test suite,
#   3. build the sdist + wheel and upload them as the `dist` artifact.
# The caller then downloads that artifact, publishes to PyPI (Trusted Publishing, matched
# against the caller repo), and tags + creates the GitHub Release after a successful upload.
#
# Callers reference it as:
#   uses: bnelair/brainmaze-sphinx/.github/workflows/release.yml@main

on:
  workflow_call:
    inputs:
      bump:
        description: "Deprecated and ignored -- version is bumped via the Prepare release PR. Kept optional so old callers don't fail."
        type: string
        required: false
        default: ""
      python-version:
        type: string
        default: "3.10"
    outputs:
      released:
        description: "'true' when the current version has no tag yet and a release should be published."
        value: ${{ jobs.guard.outputs.release }}
      version:
        description: "The version read from pyproject.toml."
        value: ${{ jobs.guard.outputs.version }}

concurrency:
  group: release-${{ github.repository }}
  cancel-in-progress: false

jobs:
  # Only release when the current pyproject version has no tag yet.
  guard:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decide whether to release
        id: check
        shell: bash
        run: |
          set -euo pipefail
          version="$(grep -m1 -E '^version[[:space:]]*=' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          # git ls-remote --exit-code: 0 = ref found, 2 = no matching ref, other = real error.
          # Distinguish them so a transient network/auth failure never looks like "no tag".
          set +e
          git ls-remote --exit-code --tags origin "refs/tags/v${version}" >/dev/null 2>&1
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v${version} already exists -- nothing to release."
          elif [ "$rc" -eq 2 ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Version v${version} has no tag -- will release."
          else
            echo "::error::git ls-remote failed (exit ${rc}); aborting to avoid an accidental release."
            exit "$rc"
          fi

  test:
    needs: guard
    if: needs.guard.outputs.release == 'true'
    uses: bnelair/brainmaze-sphinx/.github/workflows/test.yml@main
    with:
      python-version: ${{ inputs.python-version }}

  build:
    needs: [guard, test]
    if: needs.guard.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error
