name: Test (reusable)

# Reusable test workflow shared across the BrainMaze package family.
# Callers reference it as:
#   uses: bnelair/brainmaze-sphinx/.github/workflows/test.yml@main
# It runs the package's own test suite on one job per OS.

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version used on all OSes."
        type: string
        default: "3.10"
      package-import-name:
        description: "Importable package name, e.g. brainmaze_utils (used only to print the installed version)."
        type: string
        default: ""

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install package with test extra
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install -e '.[test]'

      - name: Print installed version
        if: ${{ inputs.package-import-name != '' }}
        run: python -c "import ${{ inputs.package-import-name }} as p; print(p.__name__, p.__version__)"

      - name: Run tests
        run: python -m pytest
